<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <!-- Plug body (left) -->
  <rect x="14" y="44" width="44" height="40" rx="6" fill="#3c3c3c" stroke="#555555" stroke-width="2"/>
  <!-- Plug prongs -->
  <rect x="30" y="20" width="7" height="26" rx="3.5" fill="#888888"/>
  <rect x="45" y="20" width="7" height="26" rx="3.5" fill="#888888"/>
  <!-- Plug cord -->
  <rect x="28" y="84" width="10" height="14" rx="3" fill="#555555"/>
  <!-- Socket body (right) -->
  <rect x="70" y="44" width="44" height="40" rx="6" fill="#2d2d2d" stroke="#007acc" stroke-width="2"/>
  <!-- Socket holes -->
  <rect x="84" y="36" width="7" height="16" rx="3.5" fill="#1a1a1a"/>
  <rect x="99" y="36" width="7" height="16" rx="3.5" fill="#1a1a1a"/>
  <!-- Socket cord -->
  <rect x="90" y="84" width="10" height="14" rx="3" fill="#007acc" opacity="0.6"/>
  <!-- Gap / spark zone -->
  <line x1="58" y1="64" x2="70" y2="64" stroke="#3c3c3c" stroke-width="3" stroke-dasharray="3 3"/>
  <!-- Lightning bolt in gap -->
  <path d="M60 50 L52 65 L61 65 L51 82 L72 60 L62 60 Z" fill="#10b981"/>
</svg>
